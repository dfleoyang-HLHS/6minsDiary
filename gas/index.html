<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
      font-size: 16px; line-height: 1.6; color: #2c3e2d;
      background: linear-gradient(160deg, #e8f5e9 0%, #f0f4f8 50%, #e3f2fd 100%);
      min-height: 100vh; -webkit-font-smoothing: antialiased;
    }
    .page { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); padding: 1.5rem; margin-bottom: 1.25rem; }
    .app-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1rem; }
    .app-header h1 { margin: 0; font-size: 1.4rem; color: #2d5a27; }
    .user-info { margin: 0.25rem 0 0; font-size: 0.8rem; color: #888; word-break: break-all; }
    .header-right { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .drive-link { font-size: 0.8rem; color: #1a73e8; text-decoration: none; }
    .drive-link:hover { text-decoration: underline; }
    .intro-card { background: #f0f7f1; border-radius: 12px; padding: 1rem; margin-bottom: 1.25rem; font-size: 0.9rem; color: #444; }
    .intro-card ul { margin: 0.5rem 0 0; padding-left: 1.2rem; }
    .date-row { margin-bottom: 1.25rem; }
    .date-row label { display: block; font-weight: 600; margin-bottom: 0.4rem; color: #444; }
    .date-row input[type="date"] { width: 100%; padding: 0.6rem 0.75rem; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; font-family: inherit; }
    .date-hint { display: block; font-size: 0.75rem; color: #999; margin-top: 0.3rem; }
    .prompt-card { margin-bottom: 1rem; border: 1px solid #e8ede8; border-radius: 12px; padding: 1rem; background: #fafcfa; }
    .prompt-card label { display: block; margin-bottom: 0.5rem; }
    .prompt-number { display: inline-block; background: #4a7c59; color: #fff; width: 1.5rem; height: 1.5rem; line-height: 1.5rem; text-align: center; border-radius: 50%; font-size: 0.75rem; margin-right: 0.4rem; vertical-align: middle; }
    .prompt-title { font-weight: 700; color: #2d5a27; font-size: 0.95rem; }
    .prompt-hint { display: block; font-size: 0.8rem; color: #888; font-weight: 400; margin-top: 0.2rem; padding-left: 1.9rem; }
    .prompt-card textarea { width: 100%; padding: 0.6rem 0.75rem; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; resize: vertical; min-height: 72px; font-family: inherit; line-height: 1.5; }
    .prompt-card textarea:focus, .date-row input:focus { outline: none; border-color: #4a7c59; box-shadow: 0 0 0 3px rgba(74,124,89,0.15); }
    .btn { display: inline-flex; align-items: center; justify-content: center; padding: 0.75rem 1.25rem; font-size: 1rem; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; line-height: 1.4; -webkit-appearance: none; appearance: none; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-primary { width: 100%; background: #4a7c59; color: #fff; padding: 0.85rem; }
    .btn-primary:hover:not(:disabled) { background: #3e664a; }
    .status-message { margin-top: 1rem; text-align: center; font-size: 0.9rem; min-height: 1.4em; }
    .status-success { color: #4a7c59; }
    .status-error { color: #c0392b; }
    .diary-history h2 { margin: 0 0 1rem; font-size: 1.1rem; color: #2d5a27; }
    .diary-card { background: #f8faf8; border-radius: 10px; padding: 1rem; margin-bottom: 0.75rem; border-left: 4px solid #4a7c59; }
    .diary-card time { font-size: 0.85rem; color: #888; font-weight: 600; }
    .diary-section { margin-top: 0.6rem; }
    .diary-section strong { font-size: 0.8rem; color: #4a7c59; }
    .diary-section p { margin: 0.2rem 0 0; font-size: 0.9rem; color: #333; line-height: 1.5; }
    .empty-hint { text-align: center; color: #999; font-size: 0.85rem; }
    .app-footer { text-align: center; font-size: 0.75rem; color: #999; padding: 0.5rem; }
    .app-footer strong { color: #4a7c59; }
    .loading-overlay { text-align: center; padding: 3rem 1rem; color: #666; }
    @media (max-width: 480px) {
      .page { padding: 1rem 0.75rem 2rem; }
      .card { padding: 1.25rem 1rem; }
      .app-header { flex-direction: column; }
      .header-right { width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div id="loadingView" class="loading-overlay">
      <p>正在連結你的 Google 雲端硬碟...</p>
    </div>

    <div id="mainApp" style="display:none">
      <header class="app-header">
        <div>
          <h1>✨ 6分鐘魔法日記本</h1>
          <p id="userInfo" class="user-info"></p>
        </div>
        <div class="header-right">
          <a id="driveLink" href="#" target="_blank" rel="noopener noreferrer" class="drive-link">
            開啟 6minsdiaries 資料夾
          </a>
        </div>
      </header>

      <div class="intro-card card">
        <strong>今日三個書寫方向</strong>
        <ul>
          <li>① 感恩 — 寫下感謝的事</li>
          <li>② 讓今天更棒 — 設定正面行動</li>
          <li>③ 正向肯定 — 肯定自己與好事</li>
        </ul>
      </div>

      <form id="diaryForm" class="card diary-form">
        <div class="date-row">
          <label for="diaryDate">日記日期</label>
          <input type="date" id="diaryDate" required>
          <span class="date-hint">每日一篇，同日期再次儲存將覆蓋更新</span>
        </div>

        <div class="prompt-card">
          <label for="gratitude">
            <span class="prompt-number">①</span>
            <span class="prompt-title">感恩</span>
            <span class="prompt-hint">寫下 3 件你今天感謝的事</span>
          </label>
          <textarea id="gratitude" rows="3" required placeholder="例：感謝家人的陪伴、感謝好天氣..."></textarea>
        </div>

        <div class="prompt-card">
          <label for="great_day">
            <span class="prompt-number">②</span>
            <span class="prompt-title">讓今天更棒</span>
            <span class="prompt-hint">今天可以怎麼做，讓這一天變得更好？</span>
          </label>
          <textarea id="great_day" rows="3" required placeholder="例：提早 10 分鐘出門、專心完成最重要的一件事..."></textarea>
        </div>

        <div class="prompt-card">
          <label for="affirmation">
            <span class="prompt-number">③</span>
            <span class="prompt-title">正向肯定</span>
            <span class="prompt-hint">寫下對自己的正向肯定或今天的好事</span>
          </label>
          <textarea id="affirmation" rows="3" required placeholder="例：我很有耐心、今天順利完成了會議..."></textarea>
        </div>

        <button type="submit" id="submitBtn" class="btn btn-primary">儲存至我的 Google 雲端</button>
        <p id="statusMessage" class="status-message" role="status"></p>
      </form>

      <section class="card diary-history">
        <h2>近期日記</h2>
        <div id="diaryList"><p class="empty-hint">載入中...</p></div>
      </section>

      <footer class="app-footer">
        <p>資料儲存位置：你的 Google 雲端硬碟 → <strong>6minsdiaries</strong> 資料夾</p>
        <p>無需 Google Cloud Console 或信用卡，由 Google Apps Script 安全存取你的個人雲端</p>
      </footer>
    </div>
  </div>

  <script>
    var PROMPTS = ["gratitude", "great_day", "affirmation"];

    function todayString() {
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1);
      var day = String(d.getDate());
      if (m.length < 2) m = "0" + m;
      if (day.length < 2) day = "0" + day;
      return y + "-" + m + "-" + day;
    }

    function formatDate(dateStr) {
      if (!dateStr) return "";
      var parts = dateStr.split("-");
      return parts[0] + " 年 " + parseInt(parts[1], 10) + " 月 " + parseInt(parts[2], 10) + " 日";
    }

    function escapeHtml(text) {
      var div = document.createElement("div");
      div.textContent = text || "";
      return div.innerHTML.replace(/\n/g, "<br>");
    }

    function showStatus(msg, type) {
      var el = document.getElementById("statusMessage");
      el.className = "status-message status-" + (type || "success");
      el.textContent = msg;
    }

    function renderDiaryList(diaries) {
      var container = document.getElementById("diaryList");
      if (!diaries || !diaries.length) {
        container.innerHTML = '<p class="empty-hint">尚無日記，寫下今天的第一篇吧！</p>';
        return;
      }

      var html = "";
      for (var i = 0; i < diaries.length; i++) {
        var entry = diaries[i];
        html += '<article class="diary-card">';
        html += '<time>' + formatDate(entry.date) + '</time>';
        html += '<div class="diary-section"><strong>① 感恩</strong><p>' + escapeHtml(entry.gratitude) + '</p></div>';
        html += '<div class="diary-section"><strong>② 讓今天更棒</strong><p>' + escapeHtml(entry.great_day) + '</p></div>';
        html += '<div class="diary-section"><strong>③ 正向肯定</strong><p>' + escapeHtml(entry.affirmation) + '</p></div>';
        html += '</article>';
      }
      container.innerHTML = html;
    }

    function loadDiaries() {
      document.getElementById("diaryList").innerHTML = '<p class="empty-hint">載入中...</p>';
      google.script.run
        .withSuccessHandler(renderDiaryList)
        .withFailureHandler(function (err) {
          document.getElementById("diaryList").innerHTML =
            '<p class="empty-hint">無法載入日記：' + err.message + '</p>';
        })
        .listDiaries(14);
    }

    function initApp(userInfo) {
      document.getElementById("loadingView").style.display = "none";
      document.getElementById("mainApp").style.display = "block";

      var emailText = userInfo.email
        ? "已連結：" + userInfo.email
        : "已連結個人 Google 雲端硬碟";
      document.getElementById("userInfo").textContent = emailText;

      if (userInfo.driveUrl) {
        document.getElementById("driveLink").href = userInfo.driveUrl;
      }

      var dateInput = document.getElementById("diaryDate");
      dateInput.value = todayString();
      dateInput.max = todayString();

      loadDiaries();
    }

    document.getElementById("diaryForm").addEventListener("submit", function (e) {
      e.preventDefault();
      var btn = document.getElementById("submitBtn");
      btn.disabled = true;
      btn.textContent = "上傳至 Google 雲端...";

      var data = {
        date: document.getElementById("diaryDate").value,
        gratitude: document.getElementById("gratitude").value,
        great_day: document.getElementById("great_day").value,
        affirmation: document.getElementById("affirmation").value
      };

      google.script.run
        .withSuccessHandler(function (result) {
          var action = result.updated ? "更新" : "新增";
          showStatus("✅ 日記已" + action + "！檔案：6minsdiaries/" + result.fileName, "success");
          btn.disabled = false;
          btn.textContent = "儲存至我的 Google 雲端";
          loadDiaries();
        })
        .withFailureHandler(function (err) {
          showStatus("❌ 上傳失敗：" + err.message, "error");
          btn.disabled = false;
          btn.textContent = "儲存至我的 Google 雲端";
        })
        .saveDiary(data);
    });

    google.script.run
      .withSuccessHandler(initApp)
      .withFailureHandler(function (err) {
        document.getElementById("loadingView").innerHTML =
          '<p class="status-error">初始化失敗：' + err.message + '</p>' +
          '<p>請確認已授權此應用程式存取 Google 雲端硬碟，並重新整理頁面。</p>';
      })
      .getUserInfo();
  </script>
</body>
</html>
