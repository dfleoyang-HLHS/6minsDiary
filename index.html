<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="6分鐘魔法日記 — 連結個人 Google 帳號，將日記儲存至 Google 雲端硬碟">
    <title>6分鐘魔法日記本</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="page">
        <!-- 未登入畫面 -->
        <section id="loginScreen" class="card login-card">
            <div class="brand">
                <span class="brand-icon" aria-hidden="true">✨</span>
                <h1>6分鐘魔法日記本</h1>
                <p class="subtitle">每天 6 分鐘，用三個方向記錄正向能量</p>
            </div>

            <ul class="feature-list">
                <li>① 感恩 — 寫下感謝的事</li>
                <li>② 讓今天更棒 — 設定今日的正面行動</li>
                <li>③ 正向肯定 — 肯定自己與好事</li>
            </ul>

            <p class="cloud-info">
                登入後，日記將儲存至你個人 Google 雲端硬碟的
                <strong>6minsdiaries</strong> 資料夾
            </p>

            <button type="button" id="signInBtn" class="btn btn-google">
                <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                使用 Google 帳號登入
            </button>

            <p id="loginStatus" class="status-message" role="status"></p>
        </section>

        <!-- 主應用畫面 -->
        <div id="mainApp" class="main-app" hidden>
            <header class="app-header">
                <div class="header-left">
                    <h1>✨ 今日日記</h1>
                    <p id="userInfo" class="user-info">已連結個人 Google 雲端</p>
                </div>
                <div class="header-right">
                    <a id="driveLink" href="#" target="_blank" rel="noopener noreferrer" class="drive-link" style="display:none">
                        開啟 6minsdiaries 資料夾
                    </a>
                    <button type="button" id="signOutBtn" class="btn btn-outline btn-sm">登出</button>
                </div>
            </header>

            <form id="diaryForm" class="card diary-form">
                <div class="date-row">
                    <label for="diaryDate">日記日期</label>
                    <input type="date" id="diaryDate" name="diaryDate" required>
                    <span class="date-hint">每日一篇，同日期再次儲存將覆蓋更新</span>
                </div>

                <div id="promptFields" class="prompt-fields"></div>

                <button type="submit" id="submitBtn" class="btn btn-primary">
                    儲存至我的 Google 雲端
                </button>

                <p id="statusMessage" class="status-message" role="status"></p>
            </form>

            <section class="card diary-history">
                <h2>近期日記</h2>
                <div id="diaryList">
                    <p class="empty-hint">載入中...</p>
                </div>
            </section>

            <footer class="app-footer">
                <p>資料儲存位置：你的 Google 雲端硬碟 → <strong>6minsdiaries</strong> 資料夾</p>
            </footer>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
