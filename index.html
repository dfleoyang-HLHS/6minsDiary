<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6分鐘魔法日記本</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 600px;
            margin: 4rem auto;
            padding: 0 1.5rem;
            line-height: 1.7;
            color: #333;
        }
        h1 { color: #2d5a27; }
        code { background: #f4f4f4; padding: 2px 6px; border-radius: 4px; }
        a { color: #1a73e8; }
    </style>
</head>
<body>
    <h1>✨ 6分鐘魔法日記本</h1>
    <p>此應用程式採用 <strong>Google Apps Script</strong> 部署，需由開發者部署後取得專屬網址才能使用。</p>
    <p>日記會儲存至每位使用者個人 Google 雲端硬碟的 <code>6minsdiaries</code> 資料夾。</p>
    <h2>部署說明</h2>
    <p>請參考 <a href="https://github.com/dfleoyang-HLHS/6minsDiary/blob/main/README.md">README.md</a> 完成部署。</p>
    <h2>特色</h2>
    <ul>
        <li>不需 Google Cloud Console 或信用卡</li>
        <li>使用者以 Google 帳號登入</li>
        <li>三個日記方向：感恩、讓今天更棒、正向肯定</li>
    </ul>
</body>
</html>
