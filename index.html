<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>6分鐘魔法日記本</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>✨ 6分鐘日記實踐</h2>
        <p class="subtitle">紀錄當下的正向能量，同步至 Google 雲端資料庫</p>
        
        <form id="diaryForm">
            <div class="input-group">
                <label for="datetime">選擇日期與時間</label>
                <input type="datetime-local" id="datetime" required>
            </div>

            <div class="input-group">
                <label for="content">日記內容</label>
                <textarea id="content" placeholder="1. 我很感謝...&#10;2. 我要讓今天變得很棒的方法...&#10;3. 今天經歷的3件好事..." rows="8" required></textarea>
            </div>

            <button type="submit" id="submitBtn">傳送至雲端儲存</button>
        </form>
        
        <div id="statusMessage"></div>

        <section class="diary-history">
            <h3>近期日記</h3>
            <div id="diaryList">
                <p class="empty-hint">載入中...</p>
            </div>
        </section>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
